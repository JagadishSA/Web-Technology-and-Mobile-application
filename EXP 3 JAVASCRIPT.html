<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Auth Form</title>
</head>

<body>

<h2 id="formTitle">Login</h2>

<!-- Login Form -->
<form id="loginForm">
  <div>
    <input type="email" id="loginEmail" placeholder="Email" required>
  </div>

  <div>
    <input type="password" id="loginPassword" placeholder="Password" required>
    <button type="button" onclick="togglePassword('loginPassword')">Show</button>
  </div>

  <button type="submit">Login</button>
  <p>
    <a href="#" onclick="toggleForms()">Don't have an account? Sign Up</a>
  </p>
</form>

<!-- Signup Form -->
<form id="signupForm" style="display:none;">
  <div>
    <input type="text" id="signupName" placeholder="Full Name" required>
  </div>

  <div>
    <input type="email" id="signupEmail" placeholder="Email" required>
  </div>

  <div>
    <input type="password" id="signupPassword" placeholder="Password" required>
    <button type="button" onclick="togglePassword('signupPassword')">Show</button>
  </div>

  <div>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
  </div>

  <p id="errorMsg" style="color:red;"></p>

  <button type="submit">Register</button>
  <p>
    <a href="#" onclick="toggleForms()">Already have an account? Login</a>
  </p>
</form>

<script>
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const errorMsg = document.getElementById("errorMsg");
const formTitle = document.getElementById("formTitle");

function toggleForms() {
  if (loginForm.style.display === "none") {
    loginForm.style.display = "block";
    signupForm.style.display = "none";
    formTitle.textContent = "Login";
  } else {
    loginForm.style.display = "none";
    signupForm.style.display = "block";
    formTitle.textContent = "Sign Up";
  }
}

function togglePassword(id) {
  const field = document.getElementById(id);
  field.type = field.type === "password" ? "text" : "password";
}

// SIGNUP
signupForm.addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("signupName").value;
  const email = document.getElementById("signupEmail").value;
  const password = document.getElementById("signupPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (password.length < 6) {
    errorMsg.textContent = "Password must be at least 6 characters.";
    return;
  }

  if (password !== confirmPassword) {
    errorMsg.textContent = "Passwords do not match.";
    return;
  }

  const user = { name, email, password };
  localStorage.setItem("user", JSON.stringify(user));

  alert("Account created successfully!");
  toggleForms();
});

// LOGIN
loginForm.addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const storedUser = JSON.parse(localStorage.getItem("user"));

  if (!storedUser) {
    alert("No user found. Please sign up first.");
    return;
  }

  if (email === storedUser.email && password === storedUser.password) {
    alert("Login Successful!");
    window.location.href = "welcome.html";
  } else {
    alert("Invalid credentials.");
  }
});
</script>

</body>
</html>
